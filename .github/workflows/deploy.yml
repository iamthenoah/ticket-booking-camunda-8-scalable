name: Build and Deploy to ECR/EKS

on:
  push:
    branches:
      - "**" # testing
      - master

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ticket-booking-cluster
  EKS_NAMESPACE: ticket-booking

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Test Java Booking Service
        env:
          ZEEBE_CLIENT_CLOUD_REGION: ${{ secrets.ZEEBE_CLIENT_CLOUD_REGION }}
          ZEEBE_CLIENT_CLOUD_CLUSTERID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLUSTERID }}
          ZEEBE_CLIENT_CLOUD_CLIENTID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTID }}
          ZEEBE_CLIENT_CLOUD_CLIENTSECRET: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTSECRET }}
        run: |
          cd booking-service-java
          mvn clean test -DskipTests=false

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Test Node.js Fake Services
        env:
          ZEEBE_ADDRESS: ${{ secrets.ZEEBE_ADDRESS }}
          ZEEBE_CLIENT_ID: ${{ secrets.ZEEBE_CLIENT_ID }}
          ZEEBE_CLIENT_SECRET: ${{ secrets.ZEEBE_CLIENT_SECRET }}
          ZEEBE_AUTHORIZATION_SERVER_URL: ${{ secrets.ZEEBE_AUTHORIZATION_SERVER_URL }}
        run: |
          cd fake-services-nodejs
          npm install
          npm run lint || true
          npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.NOAH_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NOAH_AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.NOAH_AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Java booking service image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ACCOUNT_ID: ${{ secrets.NOAH_AWS_ACCOUNT_ID }}
          ZEEBE_CLIENT_CLOUD_REGION: ${{ secrets.ZEEBE_CLIENT_CLOUD_REGION }}
          ZEEBE_CLIENT_CLOUD_CLUSTERID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLUSTERID }}
          ZEEBE_CLIENT_CLOUD_CLIENTID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTID }}
          ZEEBE_CLIENT_CLOUD_CLIENTSECRET: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTSECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.NOAH_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NOAH_AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.NOAH_AWS_SESSION_TOKEN }}
        run: |
          docker build \
            --build-arg ZEEBE_CLIENT_CLOUD_REGION=$ZEEBE_CLIENT_CLOUD_REGION \
            --build-arg ZEEBE_CLIENT_CLOUD_CLUSTERID=$ZEEBE_CLIENT_CLOUD_CLUSTERID \
            --build-arg ZEEBE_CLIENT_CLOUD_CLIENTID=$ZEEBE_CLIENT_CLOUD_CLIENTID \
            --build-arg ZEEBE_CLIENT_CLOUD_CLIENTSECRET=$ZEEBE_CLIENT_CLOUD_CLIENTSECRET \
            --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
            --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
            --build-arg AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN \
            -t $ECR_REGISTRY/ticket-booking-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/ticket-booking-service:latest \
            ./booking-service-java
          docker push $ECR_REGISTRY/ticket-booking-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/ticket-booking-service:latest

      - name: Build and push fake services image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ZEEBE_ADDRESS: ${{ secrets.ZEEBE_ADDRESS }}
          ZEEBE_CLIENT_ID: ${{ secrets.ZEEBE_CLIENT_ID }}
          ZEEBE_CLIENT_SECRET: ${{ secrets.ZEEBE_CLIENT_SECRET }}
          ZEEBE_AUTHORIZATION_SERVER_URL: ${{ secrets.ZEEBE_AUTHORIZATION_SERVER_URL }}
        run: |
          docker build \
            --build-arg ZEEBE_ADDRESS=$ZEEBE_ADDRESS \
            --build-arg ZEEBE_CLIENT_ID=$ZEEBE_CLIENT_ID \
            --build-arg ZEEBE_CLIENT_SECRET=$ZEEBE_CLIENT_SECRET \
            --build-arg ZEEBE_AUTHORIZATION_SERVER_URL=$ZEEBE_AUTHORIZATION_SERVER_URL \
            -t $ECR_REGISTRY/fake-services:$IMAGE_TAG \
            -t $ECR_REGISTRY/fake-services:latest \
            ./fake-services-nodejs
          docker push $ECR_REGISTRY/fake-services:$IMAGE_TAG
          docker push $ECR_REGISTRY/fake-services:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          ACCOUNT_ID: ${{ secrets.NOAH_AWS_ACCOUNT_ID }}
          ZEEBE_CLIENT_CLOUD_REGION: ${{ secrets.ZEEBE_CLIENT_CLOUD_REGION }}
          ZEEBE_CLIENT_CLOUD_CLUSTERID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLUSTERID }}
          ZEEBE_CLIENT_CLOUD_CLIENTID: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTID }}
          ZEEBE_CLIENT_CLOUD_CLIENTSECRET: ${{ secrets.ZEEBE_CLIENT_CLOUD_CLIENTSECRET }}
          ZEEBE_ADDRESS: ${{ secrets.ZEEBE_ADDRESS }}
          ZEEBE_CLIENT_ID: ${{ secrets.ZEEBE_CLIENT_ID }}
          ZEEBE_CLIENT_SECRET: ${{ secrets.ZEEBE_CLIENT_SECRET }}
          ZEEBE_AUTHORIZATION_SERVER_URL: ${{ secrets.ZEEBE_AUTHORIZATION_SERVER_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.NOAH_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NOAH_AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.NOAH_AWS_SESSION_TOKEN }}
        run: |
          set -euo pipefail
          ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
          
          sed -e "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" \
              -e "s|ZEEBE_CLIENT_CLOUD_REGION_PLACEHOLDER|$ZEEBE_CLIENT_CLOUD_REGION|g" \
              -e "s|ZEEBE_CLIENT_CLOUD_CLUSTERID_PLACEHOLDER|$ZEEBE_CLIENT_CLOUD_CLUSTERID|g" \
              -e "s|ZEEBE_CLIENT_CLOUD_CLIENTID_PLACEHOLDER|$ZEEBE_CLIENT_CLOUD_CLIENTID|g" \
              -e "s|ZEEBE_CLIENT_CLOUD_CLIENTSECRET_PLACEHOLDER|$ZEEBE_CLIENT_CLOUD_CLIENTSECRET|g" \
              -e "s|ZEEBE_ADDRESS_PLACEHOLDER|$ZEEBE_ADDRESS|g" \
              -e "s|ZEEBE_CLIENT_ID_PLACEHOLDER|$ZEEBE_CLIENT_ID|g" \
              -e "s|ZEEBE_CLIENT_SECRET_PLACEHOLDER|$ZEEBE_CLIENT_SECRET|g" \
              -e "s|ZEEBE_AUTHORIZATION_SERVER_URL_PLACEHOLDER|$ZEEBE_AUTHORIZATION_SERVER_URL|g" \
              -e "s|AWS_ACCESS_KEY_ID_PLACEHOLDER|$AWS_ACCESS_KEY_ID|g" \
              -e "s|AWS_SECRET_ACCESS_KEY_PLACEHOLDER|$AWS_SECRET_ACCESS_KEY|g" \
              -e "s|AWS_SESSION_TOKEN_PLACEHOLDER|$AWS_SESSION_TOKEN|g" \
              .k8s/deployment.yml > rendered-deployment.yml

          kubectl apply -f rendered-deployment.yml

      - name: Apply monitoring resources
        run: |
          set -euo pipefail

          if kubectl get namespace monitoring >/dev/null 2>&1; then
            kubectl apply -k .k8s/monitoring
          else
            echo "Monitoring namespace not found; skipping .k8s/monitoring apply."
          fi

      - name: Restart deployments
        run: |
          set -euo pipefail

          kubectl rollout restart deployment/booking-service -n ${{ env.EKS_NAMESPACE }}
          kubectl rollout restart deployment/fake-services -n ${{ env.EKS_NAMESPACE }}
          kubectl rollout restart deployment/rabbitmq -n ${{ env.EKS_NAMESPACE }}

          kubectl rollout status deployment/booking-service -n ${{ env.EKS_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/fake-services -n ${{ env.EKS_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/rabbitmq -n ${{ env.EKS_NAMESPACE }} --timeout=5m

      - name: Verify deployment
        run: |
          set -euo pipefail
          kubectl get pods -n ${{ env.EKS_NAMESPACE }}
          kubectl get svc -n ${{ env.EKS_NAMESPACE }} --show-labels
