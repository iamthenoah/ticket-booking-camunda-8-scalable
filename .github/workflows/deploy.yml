name: Build and Deploy to ECR/EKS

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ticket-booking-cluster
  EKS_NAMESPACE: ticket-booking

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Test Java Booking Service
        run: |
          cd booking-service-java
          mvn clean test -DskipTests=false

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Test Node.js Fake Services
        run: |
          cd fake-services-nodejs
          npm install
          npm run lint || true
          npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.NOAH_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NOAH_AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.NOAH_AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Java booking service image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ACCOUNT_ID: ${{ secrets.NOAH_AWS_ACCOUNT_ID }}
        run: |
          docker build -t $ECR_REGISTRY/ticket-booking-service:$IMAGE_TAG -t $ECR_REGISTRY/ticket-booking-service:latest ./booking-service-java
          docker push $ECR_REGISTRY/ticket-booking-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/ticket-booking-service:latest

      - name: Build and push fake services image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/fake-services:$IMAGE_TAG -t $ECR_REGISTRY/fake-services:latest ./fake-services-nodejs
          docker push $ECR_REGISTRY/fake-services:$IMAGE_TAG
          docker push $ECR_REGISTRY/fake-services:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ github.sha }}
          ACCOUNT_ID: ${{ secrets.NOAH_AWS_ACCOUNT_ID }}
        run: |
          ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
          
          # First, create namespace and base resources
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/camunda-config.yaml
          kubectl apply -f k8s/rabbitmq.yaml
          
          # Deploy fake-services with the new image
          kubectl apply -f k8s/fake-services.yaml
          kubectl set image deployment/fake-services fake-services=$ECR_REGISTRY/fake-services:$IMAGE_TAG -n ${{ env.EKS_NAMESPACE }} --record || true
          
          # Deploy booking-service with the new image
          kubectl apply -f k8s/booking-service.yaml
          kubectl set image deployment/booking-service booking-service=$ECR_REGISTRY/ticket-booking-service:$IMAGE_TAG -n ${{ env.EKS_NAMESPACE }} --record || true
          
          # Wait for rollouts
          kubectl rollout status deployment/booking-service -n ${{ env.EKS_NAMESPACE }} --timeout=5m || true
          kubectl rollout status deployment/fake-services -n ${{ env.EKS_NAMESPACE }} --timeout=5m || true

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.EKS_NAMESPACE }}
          kubectl get svc -n ${{ env.EKS_NAMESPACE }}
