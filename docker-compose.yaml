services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ticket-booking-network

  fake-services:
    build:
      context: ./fake-services-nodejs
      dockerfile: Dockerfile
    container_name: fake-services
    ports:
      - "3000:3000"
    environment:
      # Zeebe connection details from Camunda
      ZEEBE_ADDRESS: d21e4983-4515-45ef-902d-d7d7309433bf.cdg-1.zeebe.camunda.io:443
      ZEEBE_CLIENT_ID: A-cIR7aO5uK4VyTNi_tYKibHxTSqr2g_
      ZEEBE_CLIENT_SECRET: oayXzgORlh7Dih8rS8XRW_haNWJ2PZeDfUkR~9yF74Bats01RTX2OFowjfRMgpIe
      ZEEBE_AUTHORIZATION_SERVER_URL: https://login.cloud.camunda.io/oauth/token
      ZEEBE_GRPC_ADDRESS: grpcs://d21e4983-4515-45ef-902d-d7d7309433bf.cdg-1.zeebe.camunda.io:443
      ZEEBE_TOKEN_AUDIENCE: zeebe.camunda.io
      CAMUNDA_TOKEN_AUDIENCE: zeebe.camunda.io
      CAMUNDA_CLUSTER_ID: d21e4983-4515-45ef-902d-d7d7309433bf
      CAMUNDA_CLIENT_ID: A-cIR7aO5uK4VyTNi_tYKibHxTSqr2g_
      CAMUNDA_CLIENT_SECRET: oayXzgORlh7Dih8rS8XRW_haNWJ2PZeDfUkR~9yF74Bats01RTX2OFowjfRMgpIe
      CAMUNDA_CLUSTER_REGION: cdg-1
      CAMUNDA_OAUTH_URL: https://login.cloud.camunda.io/oauth/token
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-booking-network
    restart: unless-stopped

  booking-service:
    build:
      context: ./booking-service-java
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      fake-services:
        condition: service_started
    networks:
      - ticket-booking-network
    restart: unless-stopped

networks:
  ticket-booking-network:
    driver: bridge
