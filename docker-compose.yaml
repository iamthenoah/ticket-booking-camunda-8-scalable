services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ticket-booking-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ticketbooking
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-ticketbooking}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-ticketbooking}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-ticketbooking} -d ticketbooking"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticket-booking-network

  fake-services:
    build:
      context: ./fake-services-nodejs
      dockerfile: Dockerfile
    container_name: fake-services
    ports:
      - "3000:3000"
    environment:
      ZEEBE_ADDRESS: ${ZEEBE_ADDRESS}
      ZEEBE_CLIENT_ID: ${ZEEBE_CLIENT_ID}
      ZEEBE_CLIENT_SECRET: ${ZEEBE_CLIENT_SECRET}
      ZEEBE_AUTHORIZATION_SERVER_URL: ${ZEEBE_AUTHORIZATION_SERVER_URL}
      ZEEBE_TOKEN_AUDIENCE: ${ZEEBE_TOKEN_AUDIENCE:-zeebe.camunda.io}
      CAMUNDA_TOKEN_AUDIENCE: ${CAMUNDA_TOKEN_AUDIENCE:-zeebe.camunda.io}
      CAMUNDA_CLUSTER_ID: ${CAMUNDA_CLUSTER_ID}
      CAMUNDA_CLIENT_ID: ${CAMUNDA_CLIENT_ID}
      CAMUNDA_CLIENT_SECRET: ${CAMUNDA_CLIENT_SECRET}
      CAMUNDA_CLUSTER_REGION: ${CAMUNDA_CLUSTER_REGION}
      CAMUNDA_OAUTH_URL: ${CAMUNDA_OAUTH_URL}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      PORT: 3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-booking-network
    restart: unless-stopped

  booking-service:
    build:
      context: ./booking-service-java
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "8080:8080"
    environment:
      CAMUNDA_CLUSTER_REGION: ${CAMUNDA_CLUSTER_REGION}
      CAMUNDA_CLUSTER_ID: ${CAMUNDA_CLUSTER_ID}
      CAMUNDA_CLIENT_ID: ${CAMUNDA_CLIENT_ID}
      CAMUNDA_CLIENT_SECRET: ${CAMUNDA_CLIENT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ticketbooking}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ticketbooking}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-ticketbooking}
      TICKETBOOKING_PAYMENT_ENDPOINT: http://fake-services:3000/ticket
    depends_on:
      rabbitmq:
        condition: service_healthy
      fake-services:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ticket-booking-network
    restart: unless-stopped

networks:
  ticket-booking-network:
    driver: bridge
