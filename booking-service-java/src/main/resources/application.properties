zeebe.client.cloud.region = ${ZEEBE_CLIENT_CLOUD_REGION}
zeebe.client.cloud.clusterId = ${ZEEBE_CLIENT_CLOUD_CLUSTERID}
zeebe.client.cloud.clientId = ${ZEEBE_CLIENT_CLOUD_CLIENTID}
zeebe.client.cloud.clientSecret = ${ZEEBE_CLIENT_CLOUD_CLIENTSECRET}

spring.rabbitmq.host = rabbitmq
spring.rabbitmq.port = 5672
spring.rabbitmq.username = guest
spring.rabbitmq.password = guest

ticketbooking.payment.endpoint = http://fake-services:3000

aws.enabled = true

# RDS PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${RDS_HOST}:5432/bookings
spring.datasource.username=${RDS_USER}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

management.endpoints.web.exposure.include = health,info,prometheus
management.endpoint.health.probes.enabled = true
