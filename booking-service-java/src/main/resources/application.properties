# Camunda Platform 8 (SaaS)
zeebe.client.cloud.region=${CAMUNDA_CLUSTER_REGION:cdg-1}
zeebe.client.cloud.clusterId=${CAMUNDA_CLUSTER_ID:your-cluster-id}
zeebe.client.cloud.clientId=${CAMUNDA_CLIENT_ID:your-client-id}
zeebe.client.cloud.clientSecret=${CAMUNDA_CLIENT_SECRET:your-client-secret}
zeebe.client.cloud.authUrl=${CAMUNDA_OAUTH_URL:https://login.cloud.camunda.io/oauth/token}

# RabbitMQ connection
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@rabbitmq:5672}

# Ticket generator endpoint
ticketbooking.payment.endpoint=${TICKETBOOKING_PAYMENT_ENDPOINT:http://ticket-generator:3000/ticket}

# SQL persistence
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ticketbooking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ticketbooking}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ticketbooking}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always

# Kubernetes health probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
