        image: REGISTRY_PLACEHOLDER/fake-services:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: ZEEBE_ADDRESS
          value: "d21e4983-4515-45ef-902d-d7d7309433bf.cdg-1.zeebe.camunda.io:443"
        - name: ZEEBE_CLIENT_ID
          value: "A-cIR7aO5uK4VyTNi_tYKibHxTSqr2g_"
        - name: ZEEBE_CLIENT_SECRET
          value: "oayXzgORlh7Dih8rS8XRW_haNWJ2PZeDfUkR~9yF74Bats01RTX2OFowjfRMgpIe"
        - name: ZEEBE_AUTHORIZATION_SERVER_URL
          value: "https://login.cloud.camunda.io/oauth/token"
        - name: ZEEBE_GRPC_ADDRESS
          value: "grpcs://d21e4983-4515-45ef-902d-d7d7309433bf.cdg-1.zeebe.camunda.io:443"
        - name: ZEEBE_TOKEN_AUDIENCE
