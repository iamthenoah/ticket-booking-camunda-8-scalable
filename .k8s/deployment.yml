apiVersion: v1
kind: Namespace
metadata:
  name: ticket-booking

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: ticket-booking
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: REGISTRY_PLACEHOLDER/ticket-booking-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ZEEBE_CLIENT_CLOUD_REGION
          value: "ZEEBE_CLIENT_CLOUD_REGION_PLACEHOLDER"
        - name: ZEEBE_CLIENT_CLOUD_CLUSTERID
          value: "ZEEBE_CLIENT_CLOUD_CLUSTERID_PLACEHOLDER"
        - name: ZEEBE_CLIENT_CLOUD_CLIENTID
          value: "ZEEBE_CLIENT_CLOUD_CLIENTID_PLACEHOLDER"
        - name: ZEEBE_CLIENT_CLOUD_CLIENTSECRET
          value: "ZEEBE_CLIENT_CLOUD_CLIENTSECRET_PLACEHOLDER"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticket-booking
  labels:
    app: booking-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: booking-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-services
  namespace: ticket-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-services
  template:
    metadata:
      labels:
        app: fake-services
    spec:
      containers:
      - name: fake-services
        image: REGISTRY_PLACEHOLDER/fake-services:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: ZEEBE_ADDRESS
          value: "ZEEBE_ADDRESS_PLACEHOLDER"
        - name: ZEEBE_CLIENT_ID
          value: "ZEEBE_CLIENT_ID_PLACEHOLDER"
        - name: ZEEBE_CLIENT_SECRET
          value: "ZEEBE_CLIENT_SECRET_PLACEHOLDER"
        - name: ZEEBE_AUTHORIZATION_SERVER_URL
          value: "ZEEBE_AUTHORIZATION_SERVER_URL_PLACEHOLDER"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: fake-services
  namespace: ticket-booking
  labels:
    app: fake-services
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: fake-services

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: ticket-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        command:
        - sh
        - -c
        - rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        - containerPort: 15692
          name: prometheus
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "guest"
        - name: RABBITMQ_DEFAULT_PASS
          value: "guest"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ticket-booking
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  ports:
  - port: 5672
    targetPort: 5672
    name: amqp
  - port: 15672
    targetPort: 15672
    name: management
  - port: 15692
    targetPort: 15692
    name: prometheus
  selector:
    app: rabbitmq
