apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: booking-service
  namespace: monitoring
  labels:
    release: monitoring-stack
spec:
  selector:
    matchLabels:
      app: booking-service
  namespaceSelector:
    matchNames:
      - ticket-booking
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
