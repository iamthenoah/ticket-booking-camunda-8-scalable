apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-app
  namespace: ticket-booking-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-app
  template:
    metadata:
      labels:
        app: ticketing-app
    spec:
      containers:
        - name: ticketing-app
          image: example.com/placeholder/ticketing-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ticket-booking-config
                  key: SPRING_PROFILES_ACTIVE
            - name: TICKETBOOKING_PAYMENT_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ticket-booking-config
                  key: TICKETBOOKING_PAYMENT_ENDPOINT
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: RABBITMQ_URL
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: CAMUNDA_CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: CAMUNDA_CLUSTER_ID
            - name: CAMUNDA_CLUSTER_REGION
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: CAMUNDA_CLUSTER_REGION
            - name: CAMUNDA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: CAMUNDA_CLIENT_ID
            - name: CAMUNDA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: CAMUNDA_CLIENT_SECRET
            - name: CAMUNDA_OAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: ticket-booking-secrets
                  key: CAMUNDA_OAUTH_URL
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
