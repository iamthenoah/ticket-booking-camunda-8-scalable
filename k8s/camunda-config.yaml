apiVersion: v1
kind: ConfigMap
metadata:
  name: camunda-config
  namespace: ticket-booking
data:
  # Zeebe connection details
  ZEEBE_AUTHORIZATION_SERVER_URL: "https://login.cloud.camunda.io/oauth/token"
  ZEEBE_TOKEN_AUDIENCE: "zeebe.camunda.io"
  ZEEBE_GRPC_ADDRESS: "grpcs://YOUR_CLUSTER_ID.YOUR_REGION.zeebe.camunda.io:443"
  CAMUNDA_TOKEN_AUDIENCE: "zeebe.camunda.io"
  CAMUNDA_CLUSTER_REGION: "cdg-1"
  CAMUNDA_OAUTH_URL: "https://login.cloud.camunda.io/oauth/token"
  
---
apiVersion: v1
kind: Secret
metadata:
  name: camunda-credentials
  namespace: ticket-booking
type: Opaque
stringData:
  # Store your Camunda credentials here
  # Get these from https://camunda.io/
  CAMUNDA_CLUSTER_ID: "YOUR_CLUSTER_ID"
  ZEEBE_CLUSTER_ID: "YOUR_CLUSTER_ID"
  ZEEBE_CLIENT_ID: "YOUR_CLIENT_ID"
  ZEEBE_CLIENT_SECRET: "YOUR_CLIENT_SECRET"
  CAMUNDA_CLIENT_ID: "YOUR_CLIENT_ID"
  CAMUNDA_CLIENT_SECRET: "YOUR_CLIENT_SECRET"
