apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ticket-booking
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  ports:
  - port: 5672
    targetPort: 5672
    protocol: TCP
    name: amqp
  - port: 15672
    targetPort: 15672
    protocol: TCP
    name: management
  selector:
    app: rabbitmq

---
apiVersion: v1
kind: Service
metadata:
  name: fake-services
  namespace: ticket-booking
  labels:
    app: fake-services
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: fake-services

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticket-booking
  labels:
    app: booking-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: booking-service
