apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-services
  namespace: ticket-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-services
  template:
    metadata:
      labels:
        app: fake-services
    spec:
      containers:
      - name: fake-services
        image: REGISTRY_PLACEHOLDER/fake-services:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: ZEEBE_ADDRESS
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: ZEEBE_GRPC_ADDRESS
        - name: ZEEBE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: ZEEBE_CLIENT_ID
        - name: ZEEBE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: ZEEBE_CLIENT_SECRET
        - name: ZEEBE_AUTHORIZATION_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: ZEEBE_AUTHORIZATION_SERVER_URL
        - name: ZEEBE_TOKEN_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: ZEEBE_TOKEN_AUDIENCE
        - name: CAMUNDA_TOKEN_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: CAMUNDA_TOKEN_AUDIENCE
        - name: CAMUNDA_CLUSTER_ID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: CAMUNDA_CLUSTER_ID
        - name: CAMUNDA_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: CAMUNDA_CLIENT_ID
        - name: CAMUNDA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: CAMUNDA_CLIENT_SECRET
        - name: CAMUNDA_CLUSTER_REGION
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: CAMUNDA_CLUSTER_REGION
        - name: CAMUNDA_OAUTH_URL
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: CAMUNDA_OAUTH_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: fake-services
  namespace: ticket-booking
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: fake-services
