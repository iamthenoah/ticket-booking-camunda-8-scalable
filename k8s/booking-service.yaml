apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: ticket-booking
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: REGISTRY_PLACEHOLDER/ticket-booking-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq.ticket-booking.svc.cluster.local"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          value: "guest"
        - name: SPRING_RABBITMQ_PASSWORD
          value: "guest"
        - name: ZEEBE_CLIENT_CLOUD_CLUSTER_ID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: ZEEBE_CLUSTER_ID
        - name: ZEEBE_CLIENT_CLOUD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: ZEEBE_CLIENT_ID
        - name: ZEEBE_CLIENT_CLOUD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: ZEEBE_CLIENT_SECRET
        - name: ZEEBE_CLIENT_CLOUD_REGION
          valueFrom:
            configMapKeyRef:
              name: camunda-config
              key: CAMUNDA_CLUSTER_REGION
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticket-booking
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: booking-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service-hpa
  namespace: ticket-booking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
